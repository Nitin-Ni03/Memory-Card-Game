<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Card Game</title>
<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f0f2f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0;
    padding: 20px;
  }
  h1 { color: #1d72b8; margin-bottom: 10px; }
  #stats { margin-bottom: 10px; font-size:16px; }
  #game-board {
    display: grid;
    grid-template-columns: repeat(4, 100px);
    grid-gap: 15px;
  }
  .card {
    width: 100px; height: 100px;
    perspective: 1000px;
    cursor: pointer;
  }
  .card-inner {
    position: relative;
    width: 100%; height: 100%;
    text-align: center;
    transition: transform 0.6s;
    transform-style: preserve-3d;
  }
  .card.flipped .card-inner {
    transform: rotateY(180deg);
  }
  .card-front, .card-back {
    position: absolute;
    width: 100%; height: 100%;
    border-radius: 8px;
    backface-visibility: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 40px;
  }
  .card-front {
    background: #1d72b8; color: #fff;
  }
  .card-back {
    background: #e9f0fb;
    transform: rotateY(180deg);
  }
  button { margin-top:15px; padding:8px 12px; border:none; border-radius:6px; background:#1d72b8; color:#fff; cursor:pointer; }
  button:hover { background:#155a91; }
</style>
</head>
<body>

<h1>Memory Card Game</h1>
<div id="stats">Score: <span id="score">0</span> | Time: <span id="timer">0</span>s</div>
<div id="game-board"></div>
<button onclick="startGame()">Restart Game</button>

<script>
const symbols = ['🍎','🍌','🍇','🍉','🍒','🥝','🍑','🍍'];
let cards = [];
let flipped = [];
let score = 0;
let timer = 0;
let interval;

function startGame() {
  clearInterval(interval);
  score = 0;
  timer = 0;
  document.getElementById('score').textContent = score;
  document.getElementById('timer').textContent = timer;
  flipped = [];
  // Duplicate and shuffle cards
  cards = [...symbols, ...symbols].sort(()=>0.5 - Math.random());
  const board = document.getElementById('game-board');
  board.innerHTML = '';
  cards.forEach((symbol,i)=>{
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.symbol = symbol;
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-front">?</div>
        <div class="card-back">${symbol}</div>
      </div>`;
    card.addEventListener('click',()=>flipCard(card));
    board.appendChild(card);
  });
  interval = setInterval(()=>{timer++; document.getElementById('timer').textContent = timer;},1000);
}

function flipCard(card){
  if(card.classList.contains('flipped') || flipped.length===2) return;
  card.classList.add('flipped');
  flipped.push(card);
  if(flipped.length===2){
    setTimeout(checkMatch, 700);
  }
}

function checkMatch(){
  const [c1,c2] = flipped;
  if(c1.dataset.symbol === c2.dataset.symbol){
    score++; document.getElementById('score').textContent = score;
  } else {
    c1.classList.remove('flipped');
    c2.classList.remove('flipped');
  }
  flipped = [];
  if(score === symbols.length){
    clearInterval(interval);
   setTimeout(() => alert(`🎉 You won in ${timer} seconds!`), 300);

  }
}

startGame();
</script>

</body>
</html>
